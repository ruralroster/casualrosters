steps:
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=.
      - --image=gcr.io/$PROJECT_ID/rural-rosters/ruralrostersproxy:$COMMIT_SHA
      - '--location=australia-southeast1'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/ruralrostersproxy:$COMMIT_SHA'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/ruralrostersproxy:$COMMIT_SHA'
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/ruralrostersproxy:$COMMIT_SHA'
      - '--location=australia-southeast1'
      - '--namespace=default'
images:
  - 'gcr.io/$PROJECT_ID/ruralrostersproxy:$COMMIT_SHA'
