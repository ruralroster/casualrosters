<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Rosters - Shift Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2c3e50;
            color: white;
        }

        .btn-primary:hover {
            background: #1a252f;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: white;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        .login-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .login-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: #2c3e50;
            border-bottom-color: #2c3e50;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 4px;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h3 {
            margin-bottom: 15px;
        }

        .tab-content p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Messages */
        .message {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Marketplace Listing */
        .marketplace-item {
            background: #f9f9f9;
            border-left: 4px solid #000;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .marketplace-item.red {
            border-left-color: #dc3545;
            background: #ffe6e6;
        }

        .marketplace-item.blue {
            border-left-color: #007bff;
            background: #e6f2ff;
        }

        .marketplace-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .marketplace-item-header strong {
            font-size: 16px;
        }

        .marketplace-item-meta {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .marketplace-item-actions {
            display: flex;
            gap: 10px;
        }

        /* Approvals Table */
        .approvals-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .approvals-table th {
            background: #f0f0f0;
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-weight: 600;
        }

        .approvals-table td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .approvals-table tr:hover {
            background: #f9f9f9;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .color-key {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .color-key-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .color-key-dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>Rural Rosters</h2>
        <p id="loadingText" style="color: #999; font-size: 14px; margin-bottom: 20px;">Connecting...</p>
        <input type="email" id="emailInput" class="login-input" placeholder="Email address">
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" onkeypress="if(event.key==='Enter') loginWithEmail()">
        <button class="btn-primary login-button" onclick="loginWithEmail()">Login</button>
    </div>
</div>

<!-- Main Dashboard -->
<div id="mainDashboard" class="dashboard">
    <div class="container">
        <header>
            <h1>Rural Rosters</h1>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="btn-secondary" onclick="logout()">Logout</button>
            </div>
        </header>

        <div id="messageContainer"></div>

        <div class="tabs" id="tabsContainer">
            <!-- Tabs dynamically inserted here -->
        </div>

        <!-- Tabs Content Dynamically Inserted -->
        <div id="tabsContent">
            <!-- Tab content dynamically inserted here -->
        </div>
    </div>
</div>

<script>
    let BACKEND_URL = 'https://ruralrostersproxy-staging-xxx.australia-southeast1.run.app';
    
    window.addEventListener('load', async function() {
        document.getElementById('loadingText').style.display = 'none';
    });
    
    // HTTP fetch-based API shim
    const google = {
        script: {
            run: {
                withSuccessHandler: function(callback) {
                    return {
                        checkUserExists: async (email, password) => {
                            const result = await callBackend('checkUserExists', {email, password});
                            if (callback) callback(result);
                        },
                        getOfficerLocations: async (email) => {
                            const result = await callBackend('getOfficerLocations', {email});
                            if (callback) callback(result);
                        },
                        getOfficerVacancies: async (email) => {
                            const result = await callBackend('getOfficerVacancies', {email});
                            if (callback) callback(result);
                        },
                        getStaffAvailableShifts: async (email) => {
                            const result = await callBackend('getStaffAvailableShifts', {email});
                            if (callback) callback(result);
                        },
                        requestShifts: async (email, name, shifts) => {
                            const result = await callBackend('requestShifts', {email, name, shifts});
                            if (callback) callback(result);
                        },
                        listShiftForSwap: async (email, name, date, jobType, location, isServiceDisruption) => {
                            const result = await callBackend('listShiftForSwap', {email, name, date, jobType, location, isServiceDisruption});
                            if (callback) callback(result);
                        },
                        getMarketplaceListings: async (email) => {
                            const result = await callBackend('getMarketplaceListings', {email});
                            if (callback) callback(result);
                        },
                        claimShift: async (claimingEmail, claimingName, originalEmail, originalName, date, jobType, location) => {
                            const result = await callBackend('claimShift', {claimingEmail, claimingName, originalEmail, originalName, date, jobType, location});
                            if (callback) callback(result);
                        },
                        getOfficerMarketplaceListings: async (email) => {
                            const result = await callBackend('getOfficerMarketplaceListings', {email});
                            if (callback) callback(result);
                        },
                        getOfficerPendingApprovals: async (email) => {
                            const result = await callBackend('getOfficerPendingApprovals', {email});
                            if (callback) callback(result);
                        },
                        approveSwap: async (claimingEmail, claimingName, originalEmail, originalName, officerEmail, officerName, date, jobType, location) => {
                            const result = await callBackend('approveSwap', {claimingEmail, claimingName, originalEmail, originalName, officerEmail, officerName, date, jobType, location});
                            if (callback) callback(result);
                        },
                        denySwap: async (claimingEmail, claimingName, originalEmail, originalName, officerEmail, officerName, date, jobType, location) => {
                            const result = await callBackend('denySwap', {claimingEmail, claimingName, originalEmail, originalName, officerEmail, officerName, date, jobType, location});
                            if (callback) callback(result);
                        }
                    };
                }
            }
        }
    };
    
    async function callBackend(action, params) {
        if (!BACKEND_URL) {
            console.error('Backend URL not loaded');
            return { error: 'Backend not ready' };
        }
        
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action, params})
            });
            return await response.json();
        } catch(err) {
            console.error('Backend error:', err);
            return { error: err.toString() };
        }
    }
    
    // ========== APPLICATION CODE ==========
    
    let currentUser = null;
    let userRole = null;
    let userLocations = [];
    let allShifts = [];
    let marketplaceListings = [];
    let pendingApprovals = [];

    function loginWithEmail() {
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value;
        
        if (!email || !password) {
            showMessage('Please enter both email and password', 'error');
            return;
        }

        google.script.run.withSuccessHandler(function(user) {
            if (user && user.error) {
                showMessage(user.error, 'error');
                return;
            }
            if (user) {
                currentUser = { email: user.email, name: user.name };
                userRole = user.role;
                userLocations = user.locations ? user.locations.split(',').map(l => l.trim()) : [];
                showDashboard();
            }
        }).checkUserExists(email, password);
    }

    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        document.getElementById('userNameDisplay').textContent = currentUser.name || currentUser.email;
        
        setupTabs();
        loadInitialData();
    }

    function setupTabs() {
        const tabsContainer = document.getElementById('tabsContainer');
        const tabsContent = document.getElementById('tabsContent');
        
        tabsContainer.innerHTML = '';
        tabsContent.innerHTML = '';

        if (userRole === 'Officer') {
            // Officer tabs
            tabsContainer.innerHTML = `
                <button class="tab-button active" onclick="switchTab(0, this)">My Vacancies</button>
                <button class="tab-button" onclick="switchTab(1, this)">Marketplace</button>
                <button class="tab-button" onclick="switchTab(2, this)">Approvals</button>
            `;
            
            tabsContent.innerHTML = `
                <div id="tab-0" class="tab-content active">
                    <h3>My Vacancies</h3>
                    <p>Officer vacancies (BLACK) and staff marketplace listings (BLUE) at your location(s)</p>
                    <div class="color-key">
                        <div class="color-key-item">
                            <div class="color-key-dot" style="background: #000;"></div>
                            <span>Your posted vacancies</span>
                        </div>
                        <div class="color-key-item">
                            <div class="color-key-dot" style="background: #007bff;"></div>
                            <span>Staff marketplace listings</span>
                        </div>
                    </div>
                    <div id="vacanciesContainer"></div>
                </div>
                <div id="tab-1" class="tab-content">
                    <h3>Shift Marketplace</h3>
                    <p>Available shifts staff have offered to swap</p>
                    <div class="color-key">
                        <div class="color-key-item">
                            <div class="color-key-dot" style="background: #000;"></div>
                            <span>Routine shifts</span>
                        </div>
                        <div class="color-key-item">
                            <div class="color-key-dot" style="background: #dc3545;"></div>
                            <span>Service-disruption shifts (PRIORITY)</span>
                        </div>
                    </div>
                    <div id="marketplaceContainer"></div>
                </div>
                <div id="tab-2" class="tab-content">
                    <h3>Shift Swap Approvals</h3>
                    <p>Review and approve/deny pending shift swap claims</p>
                    <div id="approvalsContainer"></div>
                </div>
            `;
        } else {
            // Staff tabs
            tabsContainer.innerHTML = `
                <button class="tab-button active" onclick="switchTab(0, this)">Available Shifts</button>
                <button class="tab-button" onclick="switchTab(1, this)">Marketplace</button>
                <button class="tab-button" onclick="switchTab(2, this)">List Shift for Swap</button>
            `;
            
            tabsContent.innerHTML = `
                <div id="tab-0" class="tab-content active">
                    <h3>Available Shifts</h3>
                    <button class="btn-primary" onclick="requestShifts()" style="margin-bottom: 15px;">Request Selected Shifts</button>
                    <div id="shiftsContainer"></div>
                </div>
                <div id="tab-1" class="tab-content">
                    <h3>Shift Marketplace</h3>
                    <p>Shifts other staff are offering to swap</p>
                    <div class="color-key">
                        <div class="color-key-item">
                            <div class="color-key-dot" style="background: #000;"></div>
                            <span>Routine shifts</span>
                        </div>
                        <div class="color-key-item">
                            <div class="color-key-dot" style="background: #dc3545;"></div>
                            <span>Service-disruption shifts (PRIORITY)</span>
                        </div>
                    </div>
                    <div id="marketplaceContainer"></div>
                </div>
                <div id="tab-2" class="tab-content">
                    <h3>List Shift for Swap</h3>
                    <p>Offer a shift you want to swap</p>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="swapDate" />
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <select id="swapLocation">
                            <option value="">Select Location</option>
                            <option value="Innisfail">Innisfail</option>
                            <option value="Mareeba">Mareeba</option>
                            <option value="Tully">Tully</option>
                            <option value="Yarrabah">Yarrabah</option>
                            <option value="Atherton">Atherton</option>
                            <option value="Mossman">Mossman</option>
                            <option value="Babinda">Babinda</option>
                            <option value="Cairns">Cairns</option>
                            <option value="Telehealth">Telehealth</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Job Type</label>
                        <input type="text" id="swapJobType" placeholder="e.g., RFDS Night, ED Day" />
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="swapIsServiceDisruption" />
                        <label for="swapIsServiceDisruption">This is a service-disruption shift (check if critical)</label>
                    </div>
                    <button class="btn-primary" onclick="submitListShift()">List Shift for Swap</button>
                </div>
            `;
        }
    }

    function switchTab(idx, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + idx).classList.add('active');
        btn.classList.add('active');
    }

    function showMessage(text, type) {
        const container = document.getElementById('messageContainer');
        const messageEl = document.createElement('div');
        messageEl.className = 'message ' + type;
        messageEl.textContent = text;
        container.innerHTML = '';
        container.appendChild(messageEl);
        setTimeout(() => { if (messageEl.parentNode) messageEl.remove(); }, 5000);
    }

    function loadInitialData() {
        if (userRole === 'Officer') {
            loadOfficerData();
        } else {
            loadStaffData();
        }
    }

    function loadOfficerData() {
        setTimeout(() => {
            google.script.run.withSuccessHandler(function(listings) {
                marketplaceListings = listings || [];
                renderOfficerMarketplace();
            }).getOfficerMarketplaceListings(currentUser.email);
        }, 200);

        setTimeout(() => {
            google.script.run.withSuccessHandler(function(approvals) {
                pendingApprovals = approvals || [];
                renderApprovals();
            }).getOfficerPendingApprovals(currentUser.email);
        }, 400);
    }

    function loadStaffData() {
        setTimeout(() => {
            google.script.run.withSuccessHandler(function(listings) {
                marketplaceListings = listings || [];
                renderStaffMarketplace();
            }).getMarketplaceListings(currentUser.email);
        }, 200);
    }

    function renderOfficerMarketplace() {
        const container = document.getElementById('marketplaceContainer');
        
        if (!marketplaceListings || marketplaceListings.length === 0) {
            container.innerHTML = '<p style="color: #999;">No marketplace listings at your location(s)</p>';
            return;
        }

        let html = '';
        marketplaceListings.forEach((listing, idx) => {
            const color = listing.isServiceDisruption ? 'red' : 'black';
            const colorClass = listing.isServiceDisruption ? 'red' : '';
            html += `
                <div class="marketplace-item ${colorClass}">
                    <div class="marketplace-item-header">
                        <strong>${listing.date} - ${listing.jobType}</strong>
                        ${listing.isServiceDisruption ? '<span style="color: #dc3545; font-weight: bold;">SERVICE-DISRUPTION</span>' : ''}
                    </div>
                    <div class="marketplace-item-meta">
                        Location: ${listing.location}<br>
                        Offered by: ${listing.originalName} (${listing.originalEmail})
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    function renderStaffMarketplace() {
        const container = document.getElementById('marketplaceContainer');
        
        if (!marketplaceListings || marketplaceListings.length === 0) {
            container.innerHTML = '<p style="color: #999;">No shifts available in the marketplace right now</p>';
            return;
        }

        let html = '';
        marketplaceListings.forEach((listing, idx) => {
            const colorClass = listing.isServiceDisruption ? 'red' : '';
            html += `
                <div class="marketplace-item ${colorClass}">
                    <div class="marketplace-item-header">
                        <strong>${listing.date} - ${listing.jobType}</strong>
                        ${listing.isServiceDisruption ? '<span style="color: #dc3545; font-weight: bold;">SERVICE-DISRUPTION</span>' : ''}
                    </div>
                    <div class="marketplace-item-meta">
                        Location: ${listing.location}<br>
                        Offered by: ${listing.originalName} (${listing.originalEmail})
                    </div>
                    <div class="marketplace-item-actions">
                        <button class="btn-success" onclick="claimShift('${listing.originalEmail}', '${listing.originalName}', '${listing.date}', '${listing.jobType}', '${listing.location}')">Claim Shift</button>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    function renderApprovals() {
        const container = document.getElementById('approvalsContainer');
        
        if (!pendingApprovals || pendingApprovals.length === 0) {
            container.innerHTML = '<p style="color: #999;">No pending shift swap approvals</p>';
            return;
        }

        let html = '<table class="approvals-table"><tr><th>Claiming Staff</th><th>Original Staff</th><th>Date</th><th>Job Type</th><th>Location</th><th>Actions</th></tr>';
        
        pendingApprovals.forEach((approval, idx) => {
            html += `
                <tr>
                    <td>${approval.claimingName}</td>
                    <td>${approval.originalName}</td>
                    <td>${approval.date}</td>
                    <td>${approval.jobType}</td>
                    <td>${approval.location}</td>
                    <td>
                        <button class="btn-success" onclick="approveSwapRequest('${approval.claimingEmail}', '${approval.claimingName}', '${approval.originalEmail}', '${approval.originalName}', '${approval.date}', '${approval.jobType}', '${approval.location}')" style="padding: 4px 8px; font-size: 12px; margin-right: 5px;">Approve</button>
                        <button class="btn-danger" onclick="denySwapRequest('${approval.claimingEmail}', '${approval.claimingName}', '${approval.originalEmail}', '${approval.originalName}', '${approval.date}', '${approval.jobType}', '${approval.location}')" style="padding: 4px 8px; font-size: 12px;">Deny</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</table>';
        container.innerHTML = html;
    }

    function submitListShift() {
        const date = document.getElementById('swapDate').value;
        const location = document.getElementById('swapLocation').value;
        const jobType = document.getElementById('swapJobType').value;
        const isServiceDisruption = document.getElementById('swapIsServiceDisruption').checked;

        if (!date || !location || !jobType) {
            showMessage('Please fill in all fields', 'error');
            return;
        }

        showMessage('Listing shift for swap...', 'info');

        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Shift listed for swap!', 'success');
                document.getElementById('swapDate').value = '';
                document.getElementById('swapLocation').value = '';
                document.getElementById('swapJobType').value = '';
                document.getElementById('swapIsServiceDisruption').checked = false;
            }
        }).listShiftForSwap(currentUser.email, currentUser.name, date, jobType, location, isServiceDisruption);
    }

    function claimShift(originalEmail, originalName, date, jobType, location) {
        showMessage('Claiming shift...', 'info');

        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Shift claimed! Rostering officer has been notified.', 'success');
                setTimeout(() => loadStaffData(), 1500);
            }
        }).claimShift(currentUser.email, currentUser.name, originalEmail, originalName, date, jobType, location);
    }

    function approveSwapRequest(claimingEmail, claimingName, originalEmail, originalName, date, jobType, location) {
        showMessage('Approving shift swap...', 'info');

        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Swap approved! Emails sent to both staff members.', 'success');
                setTimeout(() => loadOfficerData(), 1500);
            }
        }).approveSwap(claimingEmail, claimingName, originalEmail, originalName, currentUser.email, currentUser.name, date, jobType, location);
    }

    function denySwapRequest(claimingEmail, claimingName, originalEmail, originalName, date, jobType, location) {
        if (!confirm('Are you sure you want to deny this swap?')) return;
        
        showMessage('Denying shift swap...', 'info');

        google.script.run.withSuccessHandler(function(result) {
            if (result.error) {
                showMessage(result.error, 'error');
            } else {
                showMessage('✓ Swap denied. Emails sent to both staff members.', 'success');
                setTimeout(() => loadOfficerData(), 1500);
            }
        }).denySwap(claimingEmail, claimingName, originalEmail, originalName, currentUser.email, currentUser.name, date, jobType, location);
    }

    function requestShifts() {
        showMessage('Feature coming soon', 'error');
    }

    function logout() {
        currentUser = null;
        userRole = null;
        userLocations = [];
        document.getElementById('mainDashboard').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('emailInput').value = '';
        document.getElementById('passwordInput').value = '';
    }
</script>
