<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Rosters - Shift Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #2c3e50;
            color: white;
        }

        .btn-primary:hover {
            background: #1a252f;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: white;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        .login-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .login-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
        }

        /* Location Selection */
        .location-selection {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Checkbox Styles */
        .location-list {
            margin: 20px 0;
        }

        .location-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            padding: 10px;
            border-radius: 4px;
        }

        .location-item:hover {
            background: #f9f9f9;
        }

        .location-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .location-item label {
            cursor: pointer;
            margin-bottom: 0;
            flex: 1;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .tab-button {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: #2c3e50;
            border-bottom-color: #2c3e50;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 4px;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h3 {
            margin-bottom: 15px;
        }

        .tab-content p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Messages */
        .message {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>Rural Rosters</h2>
        <p id="loadingText" style="color: #999; font-size: 14px; margin-bottom: 20px;">Connecting...</p>
        <input type="email" id="emailInput" class="login-input" placeholder="Email address">
        <input type="password" id="passwordInput" class="login-input" placeholder="Password" onkeypress="if(event.key==='Enter') loginWithEmail()">
        <button class="btn-primary login-button" onclick="loginWithEmail()">Login</button>
    </div>
</div>

<!-- Main Dashboard -->
<div id="mainDashboard" class="dashboard">
    <div class="container">
        <header>
            <h1>Rural Rosters</h1>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="btn-secondary" onclick="logout()">Logout</button>
            </div>
        </header>

        <div id="messageContainer"></div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab(0, this)">My Vacancies</button>
            <button class="tab-button" onclick="switchTab(1, this)">Available Shifts</button>
            <button class="tab-button" onclick="switchTab(2, this)">Settings</button>
        </div>

        <!-- My Vacancies Tab -->
        <div id="tab-0" class="tab-content active">
            <h3>My Vacancies</h3>
            <button class="btn-primary" onclick="addVacancyRow()">+ Add Shift</button>
            <button class="btn-primary" onclick="saveVacancies()" style="margin-left: 10px;">Save Changes</button>
            <div id="vacanciesContainer"></div>
        </div>

        <!-- Available Shifts Tab -->
        <div id="tab-1" class="tab-content">
            <h3>Available Shifts</h3>
            <button class="btn-primary" onclick="requestShifts()">Request Selected Shifts</button>
            <div id="shiftsContainer"></div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-2" class="tab-content">
            <h3>Settings</h3>
            <div id="settingsContent"></div>
        </div>
    </div>
</div>

<script>
    // ========== GITHUB PAGES CONFIGURATION ==========
    
    let BACKEND_URL = 'https://ruralrostersproxy-168129620374.australia-southeast1.run.app';
    
    // On page load, verify connection
    window.addEventListener('load', async function() {
        document.getElementById('loadingText').style.display = 'none';
    });
    
    // HTTP fetch-based API shim
    const google = {
        script: {
            run: {
                withSuccessHandler: function(callback) {
                    return {
                        checkUserExists: async (email, password) => {
                            const result = await callBackend('checkUserExists', {email, password});
                            if (callback) callback(result);
                        },
                        getOfficerLocations: async (email) => {
                            const result = await callBackend('getOfficerLocations', {email});
                            if (callback) callback(result);
                        },
                        getOfficerVacancies: async (email) => {
                            const result = await callBackend('getOfficerVacancies', {email});
                            if (callback) callback(result);
                        },
                        getStaffAvailableShifts: async (email) => {
                            const result = await callBackend('getStaffAvailableShifts', {email});
                            if (callback) callback(result);
                        },
                        saveOfficerVacancies: async (email, vacancies) => {
                            const result = await callBackend('saveOfficerVacancies', {email, vacancies});
                            if (callback) callback(result);
                        },
                        requestShifts: async (email, name, shifts) => {
                            const result = await callBackend('requestShifts', {email, name, shifts});
                            if (callback) callback(result);
                        },
                        getJobTypesForOfficer: async (email) => {
                            const result = await callBackend('getJobTypesForOfficer', {email});
                            if (callback) callback(result);
                        },
                        updateUserLocations: async (email, locations, role) => {
                            const result = await callBackend('updateUserLocations', {email, locations, role});
                            if (callback) callback(result);
                        },
                        updateUserAST: async (email, astQuals) => {
                            const result = await callBackend('updateUserAST', {email, astQuals});
                            if (callback) callback(result);
                        },
                        countPendingRequests: async (email) => {
                            const result = await callBackend('countPendingRequests', {email});
                            if (callback) callback(result);
                        }
                    };
                }
            }
        }
    };
    
    async function callBackend(action, params) {
        if (!BACKEND_URL) {
            console.error('Backend URL not loaded');
            return { error: 'Backend not ready' };
        }
        
        try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action, params})
            });
            return await response.json();
        } catch(err) {
            console.error('Backend error:', err);
            return { error: err.toString() };
        }
    }
    
    // ========== APPLICATION CODE ==========
    
    let currentUser = null;
    let userRole = null;
    let userLocations = [];
    let userQuals = ['Emergency'];
    const allLocations = ['Innisfail', 'Mareeba', 'Tully', 'Yarrabah', 'Atherton', 'Mossman', 'Babinda', 'Cairns', 'Telehealth'];
    let jobTypesByLocation = {};
    let allShifts = [];

    function loginWithEmail() {
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value;
        
        if (!email || !password) {
            showMessage('Please enter both email and password', 'error');
            return;
        }

        google.script.run.withSuccessHandler(function(user) {
            if (user && user.error) {
                showMessage(user.error, 'error');
                return;
            }
            if (user) {
                currentUser = { email: user.email, name: user.name };
                userRole = user.role;
                userLocations = user.locations ? user.locations.split(',').map(l => l.trim()) : [];
                userQuals = user.astQuals ? user.astQuals.split(',').map(q => q.trim()) : ['Emergency'];
                
                if (userRole === 'Officer') {
                    google.script.run.withSuccessHandler(function(locations) {
                        userLocations = locations || [];
                        showDashboard();
                    }).getOfficerLocations(user.email);
                } else {
                    showDashboard();
                }
            }
        }).checkUserExists(email, password);
    }

    function showDashboard() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        document.getElementById('userNameDisplay').textContent = currentUser.name || currentUser.email;
        
        showMessage('Loading shifts...', 'info');
        
        if (userRole === 'Officer') {
            document.querySelectorAll('.tab-button')[0].style.display = 'block';
            document.querySelectorAll('.tab-button')[1].style.display = 'none';
            setTimeout(loadVacancies, 200);
            
            setTimeout(function() {
                google.script.run.withSuccessHandler(function(count) {
                    if (count && count > 0) {
                        showMessage('⚠️ You have ' + count + ' pending shift request(s) to review', 'warning');
                    }
                }).countPendingRequests(currentUser.email);
            }, 1000);
        } else {
            document.querySelectorAll('.tab-button')[0].style.display = 'none';
            document.querySelectorAll('.tab-button')[1].style.display = 'block';
            // Activate Available Shifts tab
            document.getElementById('tab-0').classList.remove('active');
            document.getElementById('tab-1').classList.add('active');
            document.querySelectorAll('.tab-button')[1].classList.add('active');
            setTimeout(loadAvailableShifts, 200);
        }
        
        loadSettingsScreen();
    }

    function switchTab(idx, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + idx).classList.add('active');
        btn.classList.add('active');
    }

    function showMessage(text, type) {
        const container = document.getElementById('messageContainer');
        const messageEl = document.createElement('div');
        messageEl.className = 'message ' + type;
        messageEl.textContent = text;
        container.innerHTML = '';
        container.appendChild(messageEl);
        setTimeout(() => { if (messageEl.parentNode) messageEl.remove(); }, 5000);
    }

    function clearMessage() {
        document.getElementById('messageContainer').innerHTML = '';
    }

    function loadVacancies() {
        if (userRole !== 'Officer') return;
        
        google.script.run.withSuccessHandler(function(jobTypes) {
            jobTypesByLocation = jobTypes || {};
            setTimeout(function() {
                google.script.run.withSuccessHandler(function(vacancies) {
                    renderVacanciesTable(vacancies || []);
                    clearMessage();
                }).getOfficerVacancies(currentUser.email);
            }, 100);
        }).getJobTypesForOfficer(currentUser.email);
    }

    function renderVacanciesTable(vacancies) {
        const container = document.getElementById('vacanciesContainer');
        
        if (!vacancies || vacancies.length === 0) {
            container.innerHTML = '<p style="color: #999;">No vacancies yet</p>';
            return;
        }

        const sorted = vacancies.sort((a, b) => {
            const dateA = parseDate(a.date);
            const dateB = parseDate(b.date);
            return dateA - dateB;
        });

        let html = '<table style="width: 100%; border-collapse: collapse;"><tr style="background: #f9f9f9;"><th style="padding: 10px; text-align: left; border-bottom: 1px solid #ddd;">Date</th><th style="padding: 10px; text-align: left; border-bottom: 1px solid #ddd;">Location</th><th style="padding: 10px; text-align: left; border-bottom: 1px solid #ddd;">Job Type</th><th style="padding: 10px; text-align: left; border-bottom: 1px solid #ddd;">Action</th></tr>';
        
        sorted.forEach((vac, idx) => {
            let dateString = '';
            if (vac.date && vac.date.includes('/')) {
                const parts = vac.date.split('/');
                if (parts.length === 3) {
                    const day = String(parts[0]).padStart(2, '0');
                    const month = String(parts[1]).padStart(2, '0');
                    const year = parts[2];
                    dateString = year + '-' + month + '-' + day;
                }
            } else {
                dateString = vac.date || '';
            }
            
            const location = String(vac.location).trim();
            const jobTypes = jobTypesByLocation[location] || [];
            
            let jobTypeOptions = '<select class="vac-jobtype" style="width: 100%; padding: 4px; border: 1px solid #ddd;"><option value="">Select Job Type</option>';
            jobTypes.forEach(jt => {
                const selected = jt === vac.jobType ? ' selected' : '';
                jobTypeOptions += '<option value="' + jt + '"' + selected + '>' + jt + '</option>';
            });
            jobTypeOptions += '</select>';
            
            html += '<tr style="border-bottom: 1px solid #f0f0f0;"><td style="padding: 10px;"><input type="date" class="vac-date" value="' + dateString + '" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td><td style="padding: 10px;"><input type="text" class="vac-location" value="' + location + '" style="width: 100%; padding: 4px; border: 1px solid #ddd;" disabled></td><td style="padding: 10px;">' + jobTypeOptions + '</td><td style="padding: 10px;"><button class="btn-secondary" onclick="removeVacancyRow(this)" style="padding: 4px 8px; font-size: 12px;">Remove</button></td></tr>';
        });
        html += '</table>';
        container.innerHTML = html;
    }
    
    function parseDate(dateStr) {
        if (!dateStr) return new Date(0);
        if (dateStr.includes('/')) {
            const [day, month, year] = dateStr.split('/');
            return new Date(year, month - 1, day);
        }
        return new Date(dateStr);
    }

    function addVacancyRow() {
        const container = document.getElementById('vacanciesContainer');
        let table = container.querySelector('table');
        const location = userLocations[0];
        const jobTypes = jobTypesByLocation[location] || [];
        
        if (!table) {
            let html = '<table style="width: 100%; border-collapse: collapse;"><tr style="background: #f9f9f9;"><th style="padding: 10px; text-align: left; border-bottom: 1px solid #ddd;">Date</th><th style="padding: 10px; text-align: left; border-bottom: 1px solid #ddd;">Location</th><th style="padding: 10px; text-align: left; border-bottom: 1px solid #ddd;">Job Type</th><th style="padding: 10px; text-align: left; border-bottom: 1px solid #ddd;">Action</th></tr></table>';
            container.innerHTML = html;
            table = container.querySelector('table');
        }
        
        let locationOptions = '<select class="vac-location" style="width: 100%; padding: 4px; border: 1px solid #ddd;" onchange="updateJobTypeDropdown(this)"><option value="">Step 2: Select Location</option>';
        userLocations.forEach(loc => {
            locationOptions += '<option value="' + loc + '">' + loc + '</option>';
        });
        locationOptions += '</select>';
        
        let jobTypeOptions = '<select class="vac-jobtype" style="width: 100%; padding: 4px; border: 1px solid #ddd;"><option value="">Step 3: Select Job Type</option></select>';
        
        const newRow = table.insertRow();
        newRow.innerHTML = '<td style="padding: 10px;"><input type="date" class="vac-date" placeholder="Step 1: Select Date" style="width: 100%; padding: 4px; border: 1px solid #ddd;"></td><td style="padding: 10px;">' + locationOptions + '</td><td style="padding: 10px;">' + jobTypeOptions + '</td><td style="padding: 10px;"><button class="btn-secondary" onclick="removeVacancyRow(this)" style="padding: 4px 8px; font-size: 12px;">Remove</button></td>';
    }
    
    function updateJobTypeDropdown(locationSelect) {
        const row = locationSelect.closest('tr');
        const location = locationSelect.value;
        const jobTypeSelect = row.querySelector('.vac-jobtype');
        
        if (!location) {
            jobTypeSelect.innerHTML = '<option value="">Step 3: Select Job Type</option>';
            return;
        }
        
        // Call backend to get job types for this location from Shift Types sheet
        callBackend('getJobTypesForLocation', {location}).then(result => {
            jobTypeSelect.innerHTML = '<option value="">Step 3: Select Job Type</option>';
            if (result.jobTypes) {
                result.jobTypes.forEach(jt => {
                    jobTypeSelect.innerHTML += '<option value="' + jt + '">' + jt + '</option>';
                });
            }
        }).catch(err => {
            console.error('Error loading job types:', err);
            jobTypeSelect.innerHTML = '<option value="">Error loading job types</option>';
        });
    }

    function removeVacancyRow(btn) {
        btn.parentElement.parentElement.remove();
    }

    function saveVacancies() {
        const rows = document.querySelectorAll('#vacanciesContainer table tbody tr, #vacanciesContainer table tr');
        const vacancies = [];
        
        rows.forEach(row => {
            const dateInput = row.querySelector('.vac-date');
            const jobtypeInput = row.querySelector('.vac-jobtype');
            const locationInput = row.querySelector('.vac-location');
            
            if (dateInput && jobtypeInput && locationInput) {
                let date = dateInput.value;
                const jobType = jobtypeInput.value;
                const location = locationInput.value;
                
                if (date && date.includes('-')) {
                    const [year, month, day] = date.split('-');
                    date = day + '/' + month + '/' + year;
                }
                
                if (date && jobType && location) {
                    vacancies.push({ date, jobType, location });
                }
            }
        });

        google.script.run.withSuccessHandler(function() {
            showMessage('✓ Vacancies saved successfully', 'success');
            loadVacancies();
        }).saveOfficerVacancies(currentUser.email, vacancies);
    }

    function loadAvailableShifts() {
        if (userRole === 'Officer') {
            google.script.run.withSuccessHandler(function(shifts) {
                allShifts = shifts || [];
                renderAvailableShifts(shifts);
                clearMessage();
            }).getOfficerVacancies(currentUser.email);
        } else {
            google.script.run.withSuccessHandler(function(shifts) {
                allShifts = shifts || [];
                renderAvailableShifts(shifts);
                clearMessage();
            }).getStaffAvailableShifts(currentUser.email);
        }
    }

    function renderAvailableShifts(shifts) {
        const container = document.getElementById('shiftsContainer');
        
        if (!shifts || shifts.length === 0) {
            container.innerHTML = '<p style="color: #999;">No available shifts for your locations</p>';
            return;
        }

        const sorted = shifts.sort((a, b) => {
            const dateA = parseDate(a.date);
            const dateB = parseDate(b.date);
            return dateA - dateB;
        });

        let html = '';
        sorted.forEach((shift, idx) => {
            const shiftKey = shift.jobType + ' @ ' + shift.location + ' (' + shift.date + ')';
            html += '<div class="location-item"><input type="checkbox" id="shift-' + idx + '" value="' + idx + '"><label for="shift-' + idx + '">' + shiftKey + '</label></div>';
        });
        
        container.innerHTML = html;
    }

    function requestShifts() {
        const checkboxes = document.querySelectorAll('#shiftsContainer input[type="checkbox"]:checked');
        if (checkboxes.length === 0) {
            showMessage('Please select at least one shift', 'error');
            return;
        }

        const selected = Array.from(checkboxes).map(cb => allShifts[parseInt(cb.value)]);
        
        google.script.run.withSuccessHandler(function() {
            showMessage('✓ Shift(s) request sent successfully! Rostering officers have been notified.', 'success');
            setTimeout(function() {
                loadAvailableShifts();
            }, 1500);
        }).requestShifts(currentUser.email, currentUser.name, selected);
    }

    function loadSettingsScreen() {
        const container = document.getElementById('settingsContent');
        
        if (userRole === 'Officer') {
            container.innerHTML = '<p style="color: #666;">Your rostering locations are managed by the administrator.</p>';
            return;
        }
        
        // Staff settings
        let html = '<h4 style="margin-bottom: 15px;">Work Location Preferences</h4><div class="location-list">';
        allLocations.forEach(loc => {
            const checked = userLocations.includes(loc) ? ' checked' : '';
            html += '<div class="location-item"><input type="checkbox" id="loc-' + loc + '" value="' + loc + '"' + checked + '><label for="loc-' + loc + '">' + loc + '</label></div>';
        });
        html += '</div>';
        
        html += '<h4 style="margin-top: 30px; margin-bottom: 15px;">AST Qualifications</h4><div class="location-list">';
        ['Anaesthetics', 'O&G'].forEach(qual => {
            const checked = userQuals.includes(qual) ? ' checked' : '';
            html += '<div class="location-item"><input type="checkbox" id="ast-' + qual + '" value="' + qual + '"' + checked + '><label for="ast-' + qual + '">' + qual + '</label></div>';
        });
        html += '</div>';
        
        html += '<button class="btn-primary" onclick="saveAllSettings()" style="margin-top: 20px;">Save Settings</button>';
        container.innerHTML = html;
    }

    function saveAllSettings() {
        const locCheckboxes = document.querySelectorAll('#settingsContent input[value]');
        const locs = Array.from(locCheckboxes).filter(cb => cb.id.startsWith('loc-') && cb.checked).map(cb => cb.value);
        const quals = Array.from(locCheckboxes).filter(cb => cb.id.startsWith('ast-') && cb.checked).map(cb => cb.value);
        
        if (locs.length === 0) {
            showMessage('Please select at least one location', 'error');
            return;
        }
        
        google.script.run.withSuccessHandler(function(success) {
            if (success) {
                userLocations = locs;
                userQuals = ['Emergency', ...quals];
                showMessage('✓ Settings saved', 'success');
                loadAvailableShifts();
            }
        }).updateUserLocations(currentUser.email, locs.join(','), userRole);
    }

    function logout() {
        currentUser = null;
        userRole = null;
        userLocations = [];
        document.getElementById('mainDashboard').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('emailInput').value = '';
        document.getElementById('passwordInput').value = '';
    }
</script>

</body>
</html>
